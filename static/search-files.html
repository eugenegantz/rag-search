<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Поиск — Поиск файлов</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="p-page">
    <header class="b-header">
        <div class="b-header__container">
            <div class="b-header__logo">RAG-ПОИСК</div>
            <nav class="b-nav">
                <a class="b-nav__link" href="/">Нейропоиск</a>
                <a class="b-nav__link b-nav__link_active" href="/search-files">Поиск файлов</a>
                <a class="b-nav__link" href="/add">Добавить</a>
            </nav>
        </div>
    </header>

    <main class="p-page__container">
        <div class="b-card">
            <h1 class="b-card__title">Поиск файлов в индексе</h1>

            <div class="b-field">
                <label class="b-field__label" for="query">Размер выборки</label>
                <input class="b-field__input" id="topk" type="number" value="10">
            </div>

            <div class="b-field">
                <label class="b-field__label" for="query">Поисковый запрос</label>
                <textarea class="b-field__input" id="query" placeholder="Введите запрос для поиска файлов..."></textarea>
            </div>
            
            <button class="b-btn" id="search-files-btn">Найти</button>
            
            <div class="b-status" id="search-files-status" style="display: none;"></div>
            
            <div class="b-results" id="search-files-results"></div>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
